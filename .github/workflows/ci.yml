name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: git diff --exit-code -- dist

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: route
        uses: ./
        with:
          config: examples/freelane.yml
          job: test-linux
      - name: Check action outputs
        run: |
          test '${{ steps.route.outputs.provider }}' = 'blacksmith'
          test '${{ steps.route.outputs.runs_on }}' = '"blacksmith-2vcpu-ubuntu-2404"'
