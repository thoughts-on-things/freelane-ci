name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  runner:
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.route.outputs.label }}
      provider: ${{ steps.route.outputs.provider }}
      reason: ${{ steps.route.outputs.reason }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
      - id: route
        uses: thoughts-on-things/freelane-ci@main
        with:
          config: .freelane.yml
          job: ci-linux

  test:
    needs: runner
    runs-on: ${{ needs.runner.outputs.label }}
    steps:
      - uses: actions/checkout@v7
      - name: Show Freelane route
        run: |
          echo "Provider: ${{ needs.runner.outputs.provider }}"
          echo "Reason: ${{ needs.runner.outputs.reason }}"
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: git diff --exit-code -- dist

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: route
        uses: ./
        with:
          config: examples/freelane.yml
          job: test-linux
      - name: Check action outputs
        run: |
          test '${{ steps.route.outputs.provider }}' = 'blacksmith'
          test '${{ steps.route.outputs.label }}' = 'blacksmith-2vcpu-ubuntu-2404'
          test '${{ steps.route.outputs.runs_on }}' = '"blacksmith-2vcpu-ubuntu-2404"'
