name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  runner:
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.route.outputs.label }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
      - id: route
        uses: thoughts-on-things/freelane-ci@main
        with:
          config: .freelane.yml
          job: ci-linux

  test:
    needs: runner
    runs-on: ${{ needs.runner.outputs.label }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: git diff --exit-code -- dist

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: route
        uses: ./
        with:
          config: examples/freelane.yml
          jobs: '[{"job":"test-linux","alias":"test_linux"}]'
          sync_usage: false
      - name: Check action outputs
        run: |
          test '${{ steps.route.outputs.test_linux_provider }}' = 'github'
          test '${{ steps.route.outputs.test_linux }}' = 'ubuntu-latest'
          test '${{ steps.route.outputs.test_linux_runs_on }}' = '"ubuntu-latest"'
