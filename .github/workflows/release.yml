name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run check

      - name: Pack release tarball
        run: npm pack

      - name: Generate checksums
        run: sha256sum freelane-ci-*.tgz > SHA256SUMS

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Upload npm tarball to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" freelane-ci-*.tgz SHA256SUMS --clobber

      - name: Move major action tag
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          major="${TAG_NAME%%.*}"
          target="$(git rev-list -n 1 "$TAG_NAME")"
          git tag -f "$major" "$target"
          git push origin "refs/tags/$major" --force
