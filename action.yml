name: Freelane CI
description: Route a GitHub Actions job to the best configured CI runner provider.
author: Freelane CI contributors

inputs:
  job:
    description: Single job key from the Freelane config. Use jobs for batch routing.
    required: false
  jobs:
    description: JSON array of job and alias objects for one reserved workflow plan.
    required: false
  config:
    description: Path to the Freelane config file.
    required: false
    default: .freelane.yml
  validate:
    description: Validate config schema and provider references before resolving.
    required: false
    default: "true"
  token:
    description: GitHub token used to learn durations and current repository usage.
    required: false
  repository:
    description: Repository in owner/name form. Defaults to GITHUB_REPOSITORY.
    required: false
  sync_usage:
    description: Fetch recent GitHub Actions history before routing.
    required: false
    default: "true"
  history_limit:
    description: Maximum completed workflow runs to learn from.
    required: false
    default: "100"

outputs:
  runs_on:
    description: JSON value for use with fromJSON(...).
  label:
    description: Plain runner label when the selected runner is a single string.
  provider:
    description: Selected provider id.
  runner:
    description: Selected runner label or label array.
  reason:
    description: Short routing reason.

runs:
  using: node24
  main: dist/action.js
