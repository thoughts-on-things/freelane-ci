name: routed-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  freelane:
    name: Choose runners
    runs-on: ubuntu-latest
    outputs:
      test_linux: ${{ steps.route.outputs.test_linux }}
    steps:
      - uses: actions/checkout@v7
      - id: route
        name: Route workflow jobs
        uses: thoughts-on-things/freelane-ci@v0
        with:
          config: examples/freelane.yml
          jobs: '[{"job":"test-linux","alias":"test_linux"}]'
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          validate: true

  test:
    needs:
      - freelane
    runs-on: ${{ needs.freelane.outputs.test_linux }}
    steps:
      - uses: actions/checkout@v7
      - run: npm test
