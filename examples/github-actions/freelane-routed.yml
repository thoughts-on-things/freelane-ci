name: routed-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  freelane:
    name: Choose runners
    runs-on: ubuntu-latest
    outputs:
      test_linux: ${{ steps.test_linux.outputs.label }}
      test_linux_runs_on: ${{ steps.test_linux.outputs.runs_on }}
      test_linux_provider: ${{ steps.test_linux.outputs.provider }}
      test_linux_reason: ${{ steps.test_linux.outputs.reason }}
    steps:
      - uses: actions/checkout@v7
      - name: Check config
        run: npx --yes freelane-ci@latest config validate --config examples/freelane.yml
      - name: Preview routing
        run: npx --yes freelane-ci@latest plan --config examples/freelane.yml
      - id: test_linux
        name: Route test-linux
        uses: thoughts-on-things/freelane-ci@v0
        with:
          config: examples/freelane.yml
          job: test-linux
          validate: true

  test:
    needs:
      - freelane
    runs-on: ${{ needs.freelane.outputs.test_linux }}
    steps:
      - uses: actions/checkout@v7
      - run: npm test
