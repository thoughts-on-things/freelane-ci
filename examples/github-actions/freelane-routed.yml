name: routed-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  freelane:
    runs-on: ubuntu-latest
    outputs:
      runs_on: ${{ steps.route.outputs.runs_on }}
      provider: ${{ steps.route.outputs.provider }}
      reason: ${{ steps.route.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - id: route
        uses: freelane-ci/freelane/action@v0
        with:
          config: examples/freelane.yml
          job: test-linux

  test:
    needs:
      - freelane
    runs-on: ${{ fromJSON(needs.freelane.outputs.runs_on) }}
    steps:
      - uses: actions/checkout@v4
      - name: Show routing decision
        run: |
          echo "Provider: ${{ needs.freelane.outputs.provider }}"
          echo "Reason: ${{ needs.freelane.outputs.reason }}"
      - run: npm test
