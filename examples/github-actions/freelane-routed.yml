name: routed-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  runner:
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.route.outputs.label }}
      runs_on: ${{ steps.route.outputs.runs_on }}
      provider: ${{ steps.route.outputs.provider }}
      reason: ${{ steps.route.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - id: route
        uses: thoughts-on-things/freelane-ci@v0
        with:
          config: examples/freelane.yml
          job: test-linux
          validate: true

  test:
    needs:
      - runner
    runs-on: ${{ needs.runner.outputs.label }}
    steps:
      - uses: actions/checkout@v4
      - name: Show routing decision
        run: |
          echo "Provider: ${{ needs.runner.outputs.provider }}"
          echo "Reason: ${{ needs.runner.outputs.reason }}"
      - run: npm test
