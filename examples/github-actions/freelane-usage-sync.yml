name: freelane-usage-sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  actions: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: .freelane-usage.json
          key: freelane-usage-${{ github.run_id }}
          restore-keys: |
            freelane-usage-
      - run: npm ci
      - run: npm run build
      - run: node dist/cli.js usage sync-github --repo "$GITHUB_REPOSITORY" --output .freelane-usage.json
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: node dist/cli.js usage report --config examples/freelane.yml --usage-state .freelane-usage.json
