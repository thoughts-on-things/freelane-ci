$schema: ../schemas/freelane.schema.json
version: 1

defaults:
  paid: avoid
  fallback:
    mode: pre_schedule
    providers:
      - github
  alerts:
    github_summary: true
    github_warning: true

providers:
  github:
    enabled: true
    owner: my-org
    scope: org

  blacksmith:
    enabled: true
    free_minutes_per_month: 3000

  ubicloud:
    enabled: true
    free_credit_usd_per_month: 2

  warpbuild:
    enabled: true
    free_credit_usd_per_month: 10

  namespace:
    enabled: false
    unit_minutes_per_month: 100000

jobs:
  test-linux:
    os: linux
    arch: x64
    min_vcpu: 2
    estimate_minutes: 8
    providers:
      - github
      - blacksmith
      - ubicloud
      - warpbuild

  test-macos:
    os: macos
    arch: arm64
    min_vcpu: 6
    estimate_minutes: 12
    providers:
      - github
      - blacksmith
      - warpbuild
      - namespace
